<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>jWeather - Severe Weather Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root {
      --bg:#0f1115; --surface:#16181e; --surface-2:#1e2028;
      --border:rgba(255,255,255,0.08); --accent:#f97316;
      --text:#ffffff; --text-dim:#9ba0aa;
      --sidebar-w:72px; --panel-w:320px;
      /* NWS Warning Colors */
      --color-tor:#ff0000; --color-svr:#ffa500; --color-ffw:#8b0000;
      --color-pds:#ff1493; --color-eme:#ff00ff;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Geist',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; height:100vh; display:flex; }

    /* Navigation Sidebar */
    nav { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:20px 0; z-index:1000; }
    .nav-item { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; margin-bottom:16px; cursor:pointer; transition:0.2s; color:var(--text-dim); }
    .nav-item:hover { background:var(--surface-2); color:var(--text); }
    .nav-item.active { background:var(--accent); color:#fff; box-shadow:0 0 15px rgba(249,115,22,0.4); }

    /* Main Content Area */
    main { flex:1; position:relative; display:flex; flex-direction:column; }
    #map { flex:1; z-index:1; background:#111; }

    /* Severe Data Panel */
    #severe-panel { width:var(--panel-w); background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; z-index:10; }
    .panel-header { padding:20px; border-bottom:1px solid var(--border); }
    .panel-header h2 { font-size:1.1rem; font-weight:700; display:flex; align-items:center; gap:8px; }
    .live-indicator { width:8px; height:8px; background:#22c55e; border-radius:50%; box-shadow:0 0 8px #22c55e; animation:pulse 2s infinite; }
    
    #warning-feed { flex:1; overflow-y:auto; padding:12px; }
    .warning-card { background:var(--surface-2); border-radius:10px; padding:12px; margin-bottom:10px; border-left:4px solid #444; cursor:pointer; }
    .warning-card.tor { border-left-color:var(--color-tor); }
    .warning-card.svr { border-left-color:var(--color-svr); }
    .warning-card.ffw { border-left-color:var(--color-ffw); }
    .warning-card h4 { font-size:0.85rem; margin-bottom:4px; text-transform:uppercase; }
    .warning-card p { font-size:0.75rem; color:var(--text-dim); line-height:1.4; }

    /* Map Overlays & Controls */
    .map-controls { position:absolute; top:20px; left:20px; z-index:100; display:flex; flex-direction:column; gap:8px; }
    .btn-ctrl { background:var(--surface); border:1px solid var(--border); color:#fff; width:40px; height:40px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
  </style>
</head>
<body>

  <nav>
    <div class="nav-item active" title="Dashboard"><span class="material-symbols-rounded">dashboard</span></div>
    <div class="nav-item" title="Map & Radar"><span class="material-symbols-rounded">layers</span></div>
    <div class="nav-item" title="Severe Weather"><span class="material-symbols-rounded">warning</span></div>
    <div style="margin-top:auto" class="nav-item"><span class="material-symbols-rounded">settings</span></div>
  </nav>

  <main>
    <div class="map-controls">
      <button class="btn-ctrl" onclick="toggleRadar()"><span class="material-symbols-rounded">radar</span></button>
      <button class="btn-ctrl" onclick="toggleOutlooks()"><span class="material-symbols-rounded">Thunderstorm</span></button>
    </div>
    <div id="map"></div>
  </main>

  <aside id="severe-panel">
    <div class="panel-header">
      <h2><div class="live-indicator"></div> Live Warnings</h2>
    </div>
    <div id="warning-feed">
      <div style="padding:20px; text-align:center; color:var(--text-dim); font-size:0.8rem;">Fetching latest NWS data...</div>
    </div>
  </aside>

  <script>
    // Map Setup
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([38.5, -96.5], 5);
    const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    
    const warningsLayer = L.geoJSON(null, { style: getWarningStyle }).addTo(map);
    const outlooksLayer = L.featureGroup().addTo(map);
    let radarLayer = null;

    // Warning Colors Logic
    function getWarningStyle(feature) {
      const event = feature.properties.event;
      let color = "#fff";
      if (event.includes("Tornado Warning")) color = "#ff0000";
      else if (event.includes("Severe Thunderstorm")) color = "#ffa500";
      else if (event.includes("Flash Flood")) color = "#8b0000";
      
      // PDS/Emergency Handling
      const desc = (feature.properties.description || "").toLowerCase();
      if (desc.includes("particularly dangerous situation")) color = "#ff1493";
      if (desc.includes("tornado emergency")) color = "#ff00ff";

      return { color: color, weight: 3, fillOpacity: 0.25, fillcolor: color };
    }

    // Fetch Live NWS Data
    async function updateSevereData() {
      try {
        const response = await fetch('https://api.weather.gov/alerts/active?status=actual&message_type=alert&severity=Extreme,Severe');
        const data = await response.json();
        
        // Update Map Polygons
        warningsLayer.clearLayers();
        warningsLayer.addData(data);

        // Update Feed Sidebar
        const feed = document.getElementById('warning-feed');
        feed.innerHTML = '';
        
        const priorityEvents = data.features.filter(f => 
          ["Tornado Warning", "Severe Thunderstorm Warning", "Flash Flood Warning"].includes(f.properties.event)
        );

        if (priorityEvents.length === 0) {
          feed.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-dim); font-size:0.8rem;">No active severe warnings in the US.</div>';
          return;
        }

        priorityEvents.forEach(f => {
          const props = f.properties;
          const typeClass = props.event.includes("Tornado") ? 'tor' : props.event.includes("Flood") ? 'ffw' : 'svr';
          const card = document.createElement('div');
          card.className = `warning-card ${typeClass}`;
          card.innerHTML = `
            <h4>${props.event}</h4>
            <p><strong>Area:</strong> ${props.areaDesc}</p>
            <p style="margin-top:4px; font-size:0.7rem; opacity:0.7">Expires: ${new Date(props.expires).toLocaleTimeString()}</p>
          `;
          card.onclick = () => {
            const bounds = L.geoJSON(f).getBounds();
            map.fitBounds(bounds, { padding: [50, 50] });
          };
          feed.appendChild(card);
        });
      } catch (e) {
        console.error("NWS Fetch Error", e);
      }
    }

    // Radar Toggle
    function toggleRadar() {
      if (radarLayer) {
        map.removeLayer(radarLayer);
        radarLayer = null;
      } else {
        radarLayer = L.tileLayer('https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-n0q-900913/{z}/{x}/{y}.png', {
          tms: true, opacity: 0.6
        }).addTo(map);
      }
    }

    // Initialize
    updateSevereData();
    setInterval(updateSevereData, 120000); // Update every 2 mins
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>jWeather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root {
      --red:#f97316; --red-dim:rgba(249,115,22,0.12); --red-border:rgba(249,115,22,0.25);
      --sidebar:240px; --header:58px;
      --bg:#16181e; --surface:#1e2028; --border:rgba(255,255,255,0.08);
      --text:#fff; --text-dim:#9ba0aa;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; font-family:'Geist',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; height:100vh; }
    
    /* Layout */
    #app { display:flex; height:100vh; width:100vw; }
    #sidebar { width:var(--sidebar); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:100; }
    #main { flex:1; display:flex; flex-direction:column; position:relative; overflow:hidden; }
    #header { height:var(--header); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; background:var(--bg); z-index:90; }

    /* Navigation */
    .nav-item { display:flex; align-items:center; gap:12px; padding:12px 16px; margin:4px 8px; border-radius:10px; cursor:pointer; color:var(--text-dim); transition:0.2s; }
    .nav-item:hover { background:rgba(255,255,255,0.04); color:var(--text); }
    .nav-item.active { background:var(--red-dim); color:var(--red); }
    .nav-item .material-symbols-rounded { font-size:22px; }
    .nav-label { font-size:0.9rem; font-weight:500; }

    /* Content Areas */
    .page { display:none; position:absolute; inset:0; flex-direction:column; overflow-y:auto; padding:20px; }
    .page.active { display:flex; }

    /* Search Bar */
    .search-wrapper { flex:1; max-width:400px; position:relative; }
    #search-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 16px 10px 40px; color:#fff; font-family:inherit; outline:none; }
    .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:20px; }

    /* Maps */
    .map-container { height:400px; border-radius:16px; overflow:hidden; border:1px solid var(--border); margin-top:16px; }

    /* Desktop Overlay (Mobile-First approach) */
    #desktop-overlay { position:fixed; inset:0; background:rgba(10,11,14,0.95); z-index:9999; display:none; align-items:center; justify-content:center; padding:24px; }
    #desktop-overlay-box { background:#1e2028; border:1px solid rgba(255,255,255,0.11); border-radius:16px; padding:32px 28px; max-width:380px; width:100%; text-align:center; box-shadow:0 24px 80px rgba(0,0,0,0.5); }
    #desktop-overlay-icon { width:56px; height:56px; background:var(--red-dim); border-radius:14px; display:flex; align-items:center; justify-content:center; margin:0 auto 18px; }
    #desktop-overlay-icon .material-symbols-rounded { font-size:28px; color:var(--red); }
    #desktop-overlay-title { font-size:1.25rem; font-weight:800; color:#fff; margin-bottom:10px; }
    #desktop-overlay-body { font-size:0.85rem; color:var(--text-dim); line-height:1.65; }
  </style>
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div style="padding:24px 20px; font-weight:800; font-size:1.4rem; color:var(--red); letter-spacing:-0.5px;">jWeather</div>
    <nav>
      <div class="nav-item active" onclick="navigate('forecast')">
        <span class="material-symbols-rounded">home</span>
        <span class="nav-label">Forecast</span>
      </div>
      <div class="nav-item" onclick="navigate('radar')">
        <span class="material-symbols-rounded">radar</span>
        <span class="nav-label">Radar</span>
      </div>
      <div class="nav-item" onclick="navigate('outlooks')">
        <span class="material-symbols-rounded">thunderstorm</span>
        <span class="nav-label">Outlooks</span>
      </div>
    </nav>
  </aside>

  <main id="main">
    <header id="header">
      <div class="search-wrapper">
        <span class="material-symbols-rounded search-icon">search</span>
        <input type="text" id="search-input" placeholder="Search city or zip...">
      </div>
    </header>

    <div id="forecast" class="page active">
      <h2 id="location-name">Loading...</h2>
      <div id="current-temp" style="font-size:3rem; font-weight:700;">--°</div>
      <div id="forecast-grid"></div>
    </div>

    <div id="radar" class="page">
      <h2>Live Radar</h2>
      <div id="radar-container" class="map-container"></div>
    </div>

    <div id="outlooks" class="page">
      <h2>Severe Outlooks</h2>
      <div id="outlook-map" class="map-container"></div>
    </div>
  </main>
</div>

<div id="desktop-overlay">
  <div id="desktop-overlay-box">
    <div id="desktop-overlay-icon"><span class="material-symbols-rounded">mobile_friendly</span></div>
    <div id="desktop-overlay-title">Mobile Experience Only</div>
    <div id="desktop-overlay-body">Please open this app on a mobile device or resize your browser to a mobile aspect ratio.</div>
  </div>
</div>

<script>
let curLoc = null;

function navigate(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  
  document.getElementById(pageId).classList.add('active');
  const activeNav = Array.from(document.querySelectorAll('.nav-item')).find(n => n.getAttribute('onclick').includes(pageId));
  if (activeNav) activeNav.classList.add('active');

  if (pageId === 'outlooks') initOutlookMap();
}

function compassToDegs(dir) {
  const map = {N:0,NNE:22.5,NE:45,ENE:67.5,E:90,ESE:112.5,SE:135,SSE:157.5,S:180,SSW:202.5,SW:225,WSW:247.5,W:270,WNW:292.5,NW:315,NNW:337.5};
  return map[dir] || 0;
}

// Map Initializers
function initOutlookMap() {
  if (window.outlookMap) return;
  window.outlookMap = L.map('outlook-map', { zoomControl: false }).setView([38.5, -96.5], 4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(window.outlookMap);
}

// Data Loading Stubs (Replace with your API logic)
function loadWeather(loc) {
  document.getElementById('location-name').textContent = loc.label;
  // Add fetch(weatherApi) here...
}

function updateRadar(lat, lng) {
  // Add radar layer logic here...
}

// Startup Sequence
document.addEventListener('DOMContentLoaded', () => {
  navigate('forecast');
  
  const lastLoc = localStorage.getItem('jweather_last_location');
  const defaultLoc = { label: "North Kansas City, MO", city: "North Kansas City", state: "MO", lat: 39.1428, lng: -94.5730 };

  if (lastLoc) {
    try {
      curLoc = JSON.parse(lastLoc);
    } catch(e) {
      curLoc = defaultLoc;
    }
  } else {
    curLoc = defaultLoc;
  }
  
  loadWeather(curLoc);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live SPC Mesoscale Discussions</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: Arial, sans-serif;
        }
        #map { 
            height: 100vh; 
            width: 100vw; 
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // 1. Initialize the map, centered on the continental US
        const map = L.map('map').setView([39.8283, -98.5795], 4);

        // 2. Add the OpenStreetMap base tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 3. Define the NOAA NWS MapServer URL for Mesoscale Discussions (queried as GeoJSON)
        const spcGeoJsonUrl = "https://mapservices.weather.noaa.gov/vector/rest/services/outlooks/spc_mesoscale_discussion/MapServer/0/query?where=1%3D1&outFields=*&f=geojson";

        // 4. Fetch the live data and draw the polygons
        fetch(spcGeoJsonUrl)
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    // Style the polygons (Orange fill with solid border)
                    style: function (feature) {
                        return {
                            color: "#ff7800",
                            weight: 3,
                            opacity: 0.8,
                            fillColor: "#ff7800",
                            fillOpacity: 0.2
                        };
                    },
                    // Add a popup for each polygon containing the data attributes
                    onEachFeature: function (feature, layer) {
                        let popupContent = "<h3>Active Mesoscale Discussion</h3>";
                        if (feature.properties) {
                            // Filter out internal GIS fields for a cleaner popup
                            const ignoreFields = ["OBJECTID", "Shape_Length", "Shape_Area"];
                            for (let key in feature.properties) {
                                if (feature.properties[key] !== null && !ignoreFields.includes(key)) {
                                    popupContent += `<b>${key}:</b> ${feature.properties[key]}<br>`;
                                }
                            }
                        }
                        layer.bindPopup(popupContent);
                    }
                }).addTo(map);
            })
            .catch(error => {
                console.error('Error fetching the SPC Mesoscale Discussion data:', error);
                alert('Could not load SPC data. Check the console for details.');
            });
    </script>
</body>
</html>

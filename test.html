<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>jWeather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root {
      /* Your original color variables restored */
      --red:#f97316; --red-dim:rgba(249,115,22,0.12); --red-border:rgba(249,115,22,0.25);
      --green:#22c55e; --green-dim:rgba(34,197,94,0.12); --green-border:rgba(34,197,94,0.25);
      --amber:#f59e0b; --amber-dim:rgba(245,158,11,0.12); --amber-border:rgba(245,158,11,0.25);
      --blue:#60a5fa; --blue-dim:rgba(59,130,246,0.12); --blue-border:rgba(59,130,246,0.25);
      --md-color:#f97316; --md-dim:rgba(249,115,22,0.13); --md-border:rgba(249,115,22,0.3);
      --tor-watch:#ffe600; --tor-watch-dim:rgba(255,230,0,0.18); --tor-watch-border:rgba(255,230,0,0.4);
      --svr-watch:#c2185b; --svr-watch-dim:rgba(194,24,91,0.18); --svr-watch-border:rgba(194,24,91,0.4);
      --tor-warn:#ff0000;  --tor-warn-dim:rgba(255,0,0,0.18);    --tor-warn-border:rgba(255,0,0,0.4);
      --tor-pds:#ff1493;   --tor-pds-dim:rgba(255,20,147,0.18);  --tor-pds-border:rgba(255,20,147,0.4);
      --svr-warn:#ff6600;  --svr-warn-dim:rgba(255,102,0,0.18);  --svr-warn-border:rgba(255,102,0,0.4);
      --flood-warn:#00c851;--flood-warn-dim:rgba(0,200,81,0.18); --flood-warn-border:rgba(0,200,81,0.4);

      /* Layout variables */
      --sidebar-width: 72px;
      --header: 58px;
      --bg: #000000;
      --surface: #16181e;
      --border: rgba(255,255,255,0.07);
      --text: #ffffff;
      --text-4: #9ba0aa;
      --font: 'Geist', system-ui, sans-serif;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:row;}

    .material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;vertical-align:middle;}

    /* ── WEATHER.COM STYLE RAIL ── */
    aside {
      width: var(--sidebar-width);
      background: #000;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 16px;
      z-index: 1000;
      flex-shrink: 0;
    }

    .nav-logo { margin-bottom: 20px; color: var(--red); }

    .nav-items { width: 100%; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
    .nav-items::-webkit-scrollbar { width: 0; }

    .nav-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px 0;
      color: var(--text-4);
      text-decoration: none;
      font-size: 8px; /* High-density label text */
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      cursor: pointer;
      position: relative;
    }

    .nav-link .material-symbols-rounded { font-size: 24px; margin-bottom: 4px; }
    .nav-link:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .nav-link.active { color: var(--red); }
    .nav-link.active::before {
      content: ""; position: absolute; left: 0; top: 15%; height: 70%; width: 3px;
      background: var(--red); border-radius: 0 4px 4px 0;
    }

    /* ── MAIN LAYOUT ── */
    main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #0a0a0a; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: var(--header);
      display: flex;
      align-items: center;
      padding: 0 20px;
    }

    .search-box {
      background: #252833;
      border-radius: 20px;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 320px;
    }

    .search-box input {
      background: transparent; border: none; color: #fff;
      font-family: var(--font); outline: none; width: 100%; font-size: 14px;
    }

    #viewport { flex: 1; position: relative; overflow: hidden; display: flex; }
    #map { flex: 1; background: #111; z-index: 1; }

    /* ── MESO PANEL ── */
    #md-panel {
      width: 380px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 400;
    }
    .md-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .md-scroll { flex: 1; overflow-y: auto; padding: 12px; }

    @media (max-width: 768px) { aside { display: none; } }
  </style>
</head>
<body>

  <aside>
    <div class="nav-logo">
      <span class="material-symbols-rounded" style="font-size: 32px; font-variation-settings:'FILL' 1">thunderstorm</span>
    </div>
    <nav class="nav-items">
      <a href="#" class="nav-link active">
        <span class="material-symbols-rounded">map</span>
        <span>Live Map</span>
      </a>
      <a href="#" class="nav-link">
        <span class="material-symbols-rounded">cyclone</span>
        <span>Convective</span>
      </a>
      <a href="#" class="nav-link">
        <span class="material-symbols-rounded">satellite_alt</span>
        <span>Satellite</span>
      </a>
      <a href="#" class="nav-link">
        <span class="material-symbols-rounded">waves</span>
        <span>Tropical</span>
      </a>
      <a href="#" class="nav-link">
        <span class="material-symbols-rounded">ac_unit</span>
        <span>Winter</span>
      </a>
      <a href="#" class="nav-link">
        <span class="material-symbols-rounded">monitoring</span>
        <span>SPC</span>
      </a>
      <a href="#" class="nav-link">
        <span class="material-symbols-rounded">warning</span>
        <span>Severe</span>
      </a>
      <a href="#" class="nav-link">
        <span class="material-symbols-rounded">sailing</span>
        <span>Marine</span>
      </a>
      <a href="#" class="nav-link">
        <span class="material-symbols-rounded">bolt</span>
        <span>Lightning</span>
      </a>
      <a href="#" class="nav-link" style="margin-top: auto; padding-bottom: 20px;">
        <span class="material-symbols-rounded">settings</span>
        <span>Settings</span>
      </a>
    </nav>
  </aside>

  <main>
    <header>
      <div class="search-box">
        <span class="material-symbols-rounded" style="font-size: 18px; color: var(--text-4)">search</span>
        <input type="text" placeholder="Search City or Zip Code..." id="loc-search">
      </div>
      <div id="current-time" style="margin-left: auto; font-size: 13px; color: var(--text-4); font-weight: 500;"></div>
    </header>

    <div id="viewport">
      <div id="map"></div>
      <section id="md-panel">
        <div class="md-header">
          <h2 style="font-size: 14px; font-weight: 700; color: var(--red);">MESOSCALE DISCUSSIONS</h2>
          <span class="material-symbols-rounded" style="color: var(--text-4); cursor: pointer;">filter_list</span>
        </div>
        <div class="md-scroll" id="md-list"></div>
      </section>
    </div>
  </main>

  <script>
    // Initialize Map with your original settings
    const map = L.map('map', { zoomControl: false }).setView([38.5, -96.5], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Dynamic Time
    function updateHeader() {
      const now = new Date();
      document.getElementById('current-time').textContent = now.toLocaleDateString('en-US', { 
        weekday: 'long', month: 'long', day: 'numeric' 
      }).toUpperCase();
    }
    updateHeader();

    // Restoration of Nav Click interactivity
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelector('.nav-link.active').classList.remove('active');
        link.classList.add('active');
      });
    });
  </script>
</body>
</html>

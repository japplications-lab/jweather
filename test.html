<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live SPC Watches & Warnings</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        #status {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 8px 12px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="status">Fetching data...</div>

    <script>
        const map = L.map('map').setView([39.8283, -98.5795], 4);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let weatherLayerGroup; // A master layer to hold everything

        function fetchWeatherPolygons() {
            document.getElementById('status').innerText = 'Updating map...';
            const timestamp = new Date().getTime();

            // 1. Build safe, URL-encoded query for Storm-Based Warnings (Layer 0)
            const warningsParams = new URLSearchParams({
                where: "prod_type IN ('Tornado Warning', 'Severe Thunderstorm Warning')",
                outFields: "*",
                f: "geojson",
                _cb: timestamp
            });
            const warningsUrl = `https://mapservices.weather.noaa.gov/eventdriven/rest/services/WWA/watch_warn_adv/MapServer/0/query?${warningsParams.toString()}`;

            // 2. Build safe, URL-encoded query for County-Based Watches (Layer 1)
            const watchesParams = new URLSearchParams({
                where: "prod_type IN ('Tornado Watch', 'Severe Thunderstorm Watch')",
                outFields: "*",
                f: "geojson",
                _cb: timestamp
            });
            const watchesUrl = `https://mapservices.weather.noaa.gov/eventdriven/rest/services/WWA/watch_warn_adv/MapServer/1/query?${watchesParams.toString()}`;

            // 3. Fetch both endpoints at the same time
            Promise.all([
                fetch(warningsUrl).then(res => res.json()),
                fetch(watchesUrl).then(res => res.json())
            ])
            .then(([warningsData, watchesData]) => {
                
                // Clear the map of old data before drawing
                if (weatherLayerGroup) {
                    map.removeLayer(weatherLayerGroup);
                }
                
                weatherLayerGroup = L.layerGroup().addTo(map);

                // Reusable function to style polygons based on type
                const stylePolygons = (feature) => {
                    const type = feature.properties ? feature.properties.prod_type : "";
                    let polyColor = "#333333";
                    let fillOpac = 0.1;
                    let weight = 1;

                    if (type === "Tornado Warning") {
                        polyColor = "#FF0000"; fillOpac = 0.4; weight = 3;
                    } else if (type === "Severe Thunderstorm Warning") {
                        polyColor = "#FFA500"; fillOpac = 0.4; weight = 3;
                    } else if (type === "Tornado Watch") {
                        polyColor = "#FF0000"; fillOpac = 0.15; weight = 1;
                    } else if (type === "Severe Thunderstorm Watch") {
                        polyColor = "#FFFF00"; fillOpac = 0.15; weight = 1;
                    }

                    return { color: polyColor, weight: weight, opacity: 0.9, fillColor: polyColor, fillOpacity: fillOpac };
                };

                // Reusable function to build the popups
                const bindPopups = (feature, layer) => {
                    const props = feature.properties || {};
                    const popupContent = `
                        <div style="min-width: 200px;">
                            <h3 style="margin: 0 0 8px 0;">${props.prod_type || "Weather Alert"}</h3>
                            <b>Issued:</b> ${props.issuance || "Unknown"}<br>
                            <b>Expires:</b> ${props.expiration || "Unknown"}<br>
                            <div style="margin-top: 10px;">
                                <a href="${props.url || "https://www.weather.gov/"}" target="_blank" style="color: #0056b3; font-weight: bold; text-decoration: none;">&#8599; View Official Details</a>
                            </div>
                        </div>
                    `;
                    layer.bindPopup(popupContent);
                };

                // 4. Draw Watches first so they render underneath
                if (watchesData.features && watchesData.features.length > 0) {
                    L.geoJSON(watchesData, { style: stylePolygons, onEachFeature: bindPopups }).addTo(weatherLayerGroup);
                }

                // 5. Draw Warnings on top
                if (warningsData.features && warningsData.features.length > 0) {
                    L.geoJSON(warningsData, { style: stylePolygons, onEachFeature: bindPopups }).addTo(weatherLayerGroup);
                }

                document.getElementById('status').innerText = `Live | Updated: ${new Date().toLocaleTimeString()}`;
            })
            .catch(error => {
                console.error('API Error:', error);
                document.getElementById('status').innerText = 'Connection Error. Retrying...';
            });
        }

        // Initialize and loop
        fetchWeatherPolygons();
        setInterval(fetchWeatherPolygons, 120000);

    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>NWS Active Alerts - Lower 48</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; background: #f0f0f0; }
        body { margin: 0; font-family: sans-serif; }
        .info { padding: 10px; background: white; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Official NWS Color Palette (simplified mapping)
        const NWS_COLORS = {
            "Winter Storm Warning": "#FF69B4",
            "Winter Weather Advisory": "#7B68EE",
            "Red Flag Warning": "#FF1493",
            "Flood Watch": "#2E8B57",
            "Flood Warning": "#00FF00",
            "High Wind Warning": "#DAA520",
            "Wind Advisory": "#D2B48C",
            "Extreme Fire Danger": "#FF4500",
            "Special Weather Statement": "#FFE4B5",
            "Air Quality Alert": "#808080"
        };

        const map = L.map('map').setView([38.5, -96.5], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        async function loadAlerts() {
            try {
                const response = await fetch('https://api.weather.gov/alerts/active?status=actual&region_type=land');
                const data = await response.json();

                L.geoJSON(data, {
                    style: function(feature) {
                        const event = feature.properties.event;
                        // Match specific color or fallback to a generic severity color
                        const fillColor = NWS_COLORS[event] || 
                                         (event.includes('Warning') ? '#d32f2f' : 
                                          event.includes('Watch') ? '#f57c00' : '#fbc02d');
                        return {
                            fillColor: fillColor,
                            weight: 1,
                            opacity: 1,
                            color: 'white',
                            fillOpacity: 0.6
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        layer.bindPopup(`<strong>${feature.properties.event}</strong><br>${feature.properties.areaDesc}`);
                    }
                }).addTo(map);
            } catch (e) {
                console.error("Failed to fetch NWS data", e);
            }
        }

        loadAlerts();
    </script>
</body>
</html>

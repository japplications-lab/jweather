<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lower 48 Weather Warnings Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100vh;
            width: 100%;
        }
        #info-box {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 1000;
            max-width: 300px;
            display: none; /* Initially hidden */
        }
        #legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background-color: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        .legend-item {
            margin-bottom: 5px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            display: inline-block;
            margin-right: 5px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="info-box"></div>
    <div id="legend">
        <h3>Weather Alerts Legend</h3>
        <div class="legend-item"><span class="legend-color" style="background-color: red;"></span>Warning</div>
        <div class="legend-item"><span class="legend-color" style="background-color: orange;"></span>Watch</div>
        <div class="legend-item"><span class="legend-color" style="background-color: yellow;"></span>Advisory</div>
        <div class="legend-item"><span class="legend-color" style="background-color: blue;"></span>Special Weather Statement</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // Initialize the map, centered on the lower 48 states
        var map = L.map('map').setView([39.8283, -98.5795], 4); 

        // Add a base tile layer (OpenStreetMap)
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Function to style each feature (alert zone) based on its event type
        function styleAlert(feature) {
            var event = feature.properties.event.toLowerCase();
            var color = 'gray'; // Default color
            
            if (event.includes('warning')) {
                color = 'red';
            } else if (event.includes('watch')) {
                color = 'orange';
            } else if (event.includes('advisory')) {
                color = 'yellow';
            } else if (event.includes('statement')) {
                color = 'blue';
            }

            return {
                fillColor: color,
                weight: 1,
                opacity: 0.7,
                color: 'white',
                dashArray: '3',
                fillOpacity: 0.4
            };
        }

        // Function to handle interactions with each alert zone
        function onEachFeature(feature, layer) {
            layer.on({
                mouseover: function(e) {
                    var infoBox = document.getElementById('info-box');
                    infoBox.innerHTML = `<strong>${feature.properties.event}</strong><br>` +
                                        `Area: ${feature.properties.areaDesc}<br>` +
                                        `Effective: ${new Date(feature.properties.effective).toLocaleString()}<br>` +
                                        `Expires: ${new Date(feature.properties.expires).toLocaleString()}`;
                    infoBox.style.display = 'block';
                    layer.setStyle({ fillOpacity: 0.7 });
                },
                mouseout: function(e) {
                    document.getElementById('info-box').style.display = 'none';
                    layer.setStyle({ fillOpacity: 0.4 });
                },
                click: function(e) {
                    // map.fitBounds(e.target.getBounds()); // Optional: zoom to the alert area
                }
            });
        }

        // Fetch active weather alerts from the NWS API
        fetch('https://api.weather.gov/alerts/active')
            .then(response => response.json())
            .then(data => {
                // Create a GeoJSON layer with the fetched data
                L.geoJSON(data, {
                    style: styleAlert,
                    onEachFeature: onEachFeature
                }).addTo(map);
            })
            .catch(error => console.error('Error fetching weather alerts:', error));

    </script>
</body>
</html>

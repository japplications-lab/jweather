<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>jWeather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root {
      --red:#f97316; --red-dim:rgba(249,115,22,0.12); --red-border:rgba(249,115,22,0.25);
      --sidebar-width: 72px; /* Redesigned narrow rail */
      --header:58px;
      --bg:#0a0a0a; /* Darker background for weather.com feel */
      --surface:#16181e;
      --border:rgba(255,255,255,0.07); --border-2:rgba(255,255,255,0.11);
      --text:#ffffff; --text-2:#f0f2f4; --text-3:#c8cdd6; --text-4:#9ba0aa;
      --r:12px; --r-sm:8px; --r-xs:6px;
      --font:'Geist',system-ui,sans-serif;
      --shadow:0 1px 3px rgba(0,0,0,0.3),0 4px 16px rgba(0,0,0,0.2);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;flex-direction:row;} /* Flex-row for sidebar */
    
    .material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;vertical-align:middle;line-height:1;display:inline-block;}

    /* ── NAVIGATION RAIL (SIDEBAR) ── */
    aside {
      width: var(--sidebar-width);
      background: #000; /* High contrast black */
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      z-index: 1000;
      flex-shrink: 0;
    }

    .nav-logo {
      margin-bottom: 30px;
      color: var(--red);
    }

    .nav-items {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px 0;
      color: var(--text-4);
      text-decoration: none;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }

    .nav-item .material-symbols-rounded {
      font-size: 26px;
      margin-bottom: 4px;
    }

    .nav-item:hover {
      color: #fff;
      background: rgba(255,255,255,0.05);
    }

    .nav-item.active {
      color: var(--red);
    }

    /* Vertical indicator bar */
    .nav-item.active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 15%;
      height: 70%;
      width: 3px;
      background: var(--red);
      border-radius: 0 4px 4px 0;
    }

    /* ── MAIN CONTENT WRAPPER ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: var(--header);
      display: flex;
      align-items: center;
      padding: 0 24px;
      flex-shrink: 0;
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .search-box {
      background: #252833;
      border: 1px solid var(--border-2);
      border-radius: 20px;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 300px;
    }

    .search-box input {
      background: transparent;
      border: none;
      color: #fff;
      font-family: var(--font);
      outline: none;
      width: 100%;
    }

    /* ── VIEWPORT ── */
    #viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
    }

    #map {
      flex: 1;
      background: #111;
    }

    /* ── MESO PANEL (Keeping your feature) ── */
    #md-panel {
      width: 380px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 400;
    }

    .md-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .md-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    /* Desktop Hide/Show helpers */
    @media (max-width: 768px) {
      aside { display: none; }
      #md-panel { position: absolute; right: -100%; height: 100%; transition: 0.3s; }
      #md-panel.mob-open { right: 0; }
    }
  </style>
</head>
<body>

  <aside>
    <div class="nav-logo">
      <span class="material-symbols-rounded" style="font-size: 32px; font-variation-settings:'FILL' 1">thunderstorm</span>
    </div>
    <nav class="nav-items">
      <div class="nav-item active">
        <span class="material-symbols-rounded">dashboard</span>
        <span>TODAY</span>
      </div>
      <div class="nav-item">
        <span class="material-symbols-rounded">radar</span>
        <span>RADAR</span>
      </div>
      <div class="nav-item">
        <span class="material-symbols-rounded">calendar_month</span>
        <span>DAILY</span>
      </div>
      <div class="nav-item">
        <span class="material-symbols-rounded">air</span>
        <span>AIR</span>
      </div>
      <div class="nav-item" style="margin-top: auto; padding-bottom: 20px;">
        <span class="material-symbols-rounded">settings</span>
        <span>SETTINGS</span>
      </div>
    </nav>
  </aside>

  <main>
    <header>
      <div class="header-content">
        <div class="search-box">
          <span class="material-symbols-rounded" style="font-size: 18px; color: var(--text-4)">search</span>
          <input type="text" placeholder="Search City or Zip Code..." id="loc-search">
        </div>
        <div id="current-time" style="font-size: 13px; color: var(--text-3); font-weight: 500;"></div>
      </div>
    </header>

    <div id="viewport">
      <div id="map"></div>

      <section id="md-panel">
        <div class="md-header">
          <h2 style="font-size: 15px; font-weight: 700; letter-spacing: 0.5px; color: var(--red);">MESOSCALE DISCUSSIONS</h2>
          <span class="material-symbols-rounded" style="color: var(--text-4); cursor: pointer;">filter_list</span>
        </div>
        <div class="md-scroll" id="md-list">
          </div>
      </section>
    </div>
  </main>

  <script>
    // Initialize Map
    const map = L.map('map', { zoomControl: false }).setView([38.5, -96.5], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Set Time
    document.getElementById('current-time').textContent = new Date().toLocaleDateString('en-US', { 
      weekday:'long', month:'long', day:'numeric' 
    }).toUpperCase();

    // Logic for Nav Clicks
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelector('.nav-item.active').classList.remove('active');
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>

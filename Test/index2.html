<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USA Severe Weather - Clean Grey Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #3a3d42; font-family: sans-serif; color: white; }
        #map { height: 100vh; width: 100%; }
        
        .status-bar-container { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: rgba(0,0,0,0.7); z-index: 99999; }
        .status-bar { height: 100%; background: #ff6b6b; width: 100%; transform-origin: left; box-shadow: 0 0 10px #ff6b6b; }
        
        .legend-area { position: absolute; bottom: 30px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .legend-box { background: rgba(30, 32, 36, 0.95); border: 1px solid #555; border-radius: 6px; padding: 12px; width: 220px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .legend-title { font-size: 10px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #444; margin-bottom: 8px; padding-bottom: 4px; color: #ddd; display: flex; align-items: center; justify-content: space-between; }
        .countdown-text { font-size: 9px; color: #aaa; font-weight: normal; }
        
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; margin-bottom: 4px; }
        .swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }
        
        /* Native CSS Opacity Pulse restored */
        .blink { animation: severe-pulse 0.6s infinite alternate ease-in-out !important; }
        @keyframes severe-pulse { 
            0% { opacity: 1; } 
            100% { opacity: 0.15; } 
        }
    </style>
</head>
<body>

<div class="status-bar-container">
    <div id="refresh-bar" class="status-bar"></div>
</div>

<div id="map"></div>

<div class="legend-area">
    <div id="warn-box" class="legend-box" style="display:none;">
        <div class="legend-title" style="color:#ff6b6b">
            <span>Warnings</span>
            <span id="warn-countdown" class="countdown-text">(30s)</span>
        </div>
        <div id="warn-list"></div>
    </div>
    <div id="watch-box" class="legend-box" style="display:none;">
        <div class="legend-title" style="color:#feca57">Watches</div>
        <div id="watch-list"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const WORKER_URL = "https://flat-mouse-8d12.justin-e-beck.workers.dev/";

    const COLORS = {
        "Tornado Emergency": "#FF1493", "Tornado Warning": "#FF0000", "Tornado Watch": "#FFFF00",
        "Severe Thunderstorm Warning": "#FFA500", "Severe Thunderstorm Watch": "#DB7093",
        "Flash Flood Emergency": "#8B0000", "Flash Flood Warning": "#00FF00", "Flash Flood Watch": "#2E8B57",
        "Flood Warning": "#00CC44", "Flood Watch": "#2E8B57", "Areal Flood Warning": "#00CC44",
        "Areal Flood Watch": "#2E8B57", "Flash Flood Statement": "#00EE76", "Flood Statement": "#00EE76",
        "Extreme Wind Warning": "#FF8C00", "High Wind Warning": "#DAA520", "High Wind Watch": "#B8860B",
        "Hurricane Warning": "#DC143C", "Hurricane Watch": "#FF00FF", "Tropical Storm Warning": "#B22222",
        "Tropical Storm Watch": "#F08080", "Storm Surge Warning": "#B524F7", "Storm Surge Watch": "#DB70DB"
    };

    const LAYER_PRIORITY = {
        "Tornado Emergency": 600,
        "Tornado Warning": 590,
        "Severe Thunderstorm Warning": 580,
        "Flash Flood Warning": 570,
        "Tornado Watch": 560,
        "Severe Thunderstorm Watch": 550,
        "Flood Warning": 540,
        "Flash Flood Watch": 530,
        "Flood Watch": 520
    };

    const map = L.map('map', { zoomControl: false }).setView([38.5, -96], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { 
        attribution: '&copy; CARTO',
        opacity: 0.65 
    }).addTo(map);

    map.createPane('radarPane').style.zIndex = 250; 
    const radarLayer = L.tileLayer.wms("https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0q.cgi", {
        layers: 'nexrad-n0q-900913',
        format: 'image/png',
        transparent: true,
        opacity: 0.60,
        pane: 'radarPane'
    }).addTo(map);

    let alertLayer = null;
    let knownAlertIds = new Set();
    let isInitialLoad = true;
    const chimeSound = new Audio('https://actions.google.com/sounds/v1/alarms/glass_ping.ogg');

    let warningFeatures = [];
    let watchFeatures = [];

    let warningCountdown = 30;
    let warningCountdownId;

    function getAlertPane(type) {
        const paneName = type.replace(/\s+/g, '') + 'Pane';
        if (!map.getPane(paneName)) {
            map.createPane(paneName);
            const defaultZ = type.includes('Watch') ? 400 : 450; 
            map.getPane(paneName).style.zIndex = LAYER_PRIORITY[type] || defaultZ;
        }
        return paneName;
    }

    async function fetchLayer(layerNum, isWatch) {
        try {
            const res = await fetch(`${WORKER_URL}?layer=${layerNum}`);
            const data = await res.json();
            if (data.error) return [];

            const validFeatures = [];
            for (const f of data.features || []) {
                if (!f.properties || !f.properties.prod_type) continue;
                
                const cleanType = f.properties.prod_type.trim();
                f.properties.prod_type = cleanType; 
                
                if (COLORS.hasOwnProperty(cleanType)) {
                    f._isWatch = isWatch;
                    
                    // --- DIAGNOSTIC LOGGER ---
                    if (cleanType === "Severe Thunderstorm Warning" && isInitialLoad) {
                        console.log("[DEBUG] SVR Data:", f.properties);
                    }
                    
                    validFeatures.push(f);
                }
            }
            return validFeatures;
        } catch (e) { 
            console.error(`Fetch failed for layer ${layerNum}:`, e); 
            return [];
        }
    }

    async function fetchWarnings() { warningFeatures = await fetchLayer(0, false); }
    async function fetchWatches() { watchFeatures = await fetchLayer(1, true); }

    function renderMap() {
        if (alertLayer) map.removeLayer(alertLayer);
        
        const combinedFeatures = [...warningFeatures, ...watchFeatures];
        const html = { warn: [], watch: [] };
        const seen = new Set();
        let shouldPlayChime = false;

        alertLayer = L.geoJSON({ type: "FeatureCollection", features: combinedFeatures }, {
            style: (f) => {
                const type = f.properties.prod_type;
                let color = COLORS[type];

                if (!color) return { stroke: false, fill: false, interactive: false };

                const propsStr = JSON.stringify(f.properties).toUpperCase();
                
                const isElevatedTor = type === "Tornado Warning" && 
                    (propsStr.includes('OBSERVED') || propsStr.includes('RADAR CONFIRMED') || propsStr.includes('DESTRUCTIVE'));
                
                const isElevatedSvr = type === "Severe Thunderstorm Warning" && 
                    (propsStr.includes('CONSIDERABLE') || propsStr.includes('DESTRUCTIVE') || propsStr.includes('POSSIBLE'));
                
                const isEmergency = type.includes("Emergency") || type.includes("Extreme Wind");

                f._needsBlink = isEmergency || isElevatedTor || isElevatedSvr;
                if (isElevatedTor || type === "Tornado Emergency") color = "#FF1493";

                const isWatch = f._isWatch;

                if (!seen.has(type)) {
                    seen.add(type);
                    const item = `<div class="legend-item"><div class="swatch" style="background:${color}"></div>${type}</div>`;
                    isWatch ? html.watch.push(item) : html.warn.push(item);
                }

                return {
                    fillColor: color,
                    fillOpacity: isWatch ? 0.45 : 0.65, 
                    color: "white", 
                    weight: f._needsBlink ? 3 : 0.8,
                    pane: getAlertPane(type),
                    className: f._needsBlink ? 'blink' : '' 
                };
            },
            onEachFeature: (f, lyr) => {
                lyr.bindPopup(`<b>${f.properties.prod_type}</b>`);

                const type = f.properties.prod_type;
                if (type === "Severe Thunderstorm Warning" || type === "Tornado Warning") {
                    const alertId = f.id || f.properties.id || f.properties.event_id || JSON.stringify(f.properties);
                    if (!isInitialLoad && !knownAlertIds.has(alertId)) {
                        shouldPlayChime = true;
                    }
                    knownAlertIds.add(alertId);
                }
            }
        }).addTo(map);

        document.getElementById('warn-box').style.display = html.warn.length ? 'block' : 'none';
        document.getElementById('warn-list').innerHTML = html.warn.join('');
        document.getElementById('watch-box').style.display = html.watch.length ? 'block' : 'none';
        document.getElementById('watch-list').innerHTML = html.watch.join('');

        if (shouldPlayChime) {
            chimeSound.play().catch(e => console.log("User interaction required for audio."));
        }
    }

    function updateProgressBar() {
        const bar = document.getElementById('refresh-bar');
        const text = document.getElementById('warn-countdown');
        if (!bar || !text) return;
        
        const pct = (warningCountdown / 30) * 100;
        
        if (warningCountdown === 30) {
            bar.style.transition = 'none';
        } else {
            bar.style.transition = 'width 1s linear';
        }
        
        bar.style.width = pct + '%';
        text.innerText = `(${warningCountdown}s)`;
    }

    function startWarningTimer() {
        warningCountdown = 30;
        updateProgressBar();
        
        warningCountdownId = setInterval(() => {
            warningCountdown--;
            updateProgressBar();
            
            if (warningCountdown <= 0) {
                clearInterval(warningCountdownId);
                
                radarLayer.setParams({ _cv: Date.now() }, false);

                fetchWarnings().then(() => {
                    renderMap();
                    startWarningTimer();
                });
            }
        }, 1000);
    }

    async function init() {
        await Promise.all([fetchWarnings(), fetchWatches()]);
        
        renderMap();
        isInitialLoad = false; // Moved here so the logger catches the first run
        
        startWarningTimer();
        setInterval(async () => {
            await fetchWatches();
            renderMap();
        }, 900000); 
    }

    init();
</script>
</body>
</html>

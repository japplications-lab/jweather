<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Radar Test — Ridge2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --surface: #161920;
      --border:  #2a2d36;
      --text:    #f0f2f7;
      --text-2:  #9ba3b8;
      --text-3:  #5c6480;
      --red:     #e5182a;
      --font:    -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

    #app { display: flex; flex-direction: column; height: 100%; }

    #map-wrap { position: relative; flex: 1; }
    #map { width: 100%; height: 100%; }

    /* Timestamp pill */
    #map-timestamp {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 400;
      background: rgba(13,15,20,0.8);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 16px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text);
      pointer-events: none;
      white-space: nowrap;
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      z-index: 500;
      background: rgba(13,15,20,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      backdrop-filter: blur(4px);
    }
    #loading.hidden { display: none; }
    .spin-ring {
      width: 34px; height: 34px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-label { font-size: 0.8rem; color: var(--text-2); }
    #loading-prog  { font-size: 0.7rem;  color: var(--text-3); }

    /* Controls */
    #controls {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 14px 13px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Frame dots */
    #frame-dots { display: flex; gap: 3px; justify-content: center; align-items: center; }
    .fdot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); transition: background .2s; flex-shrink: 0; }
    .fdot.loaded { background: var(--text-3); }
    .fdot.active { background: var(--red); transform: scale(1.4); }

    /* Scrubber */
    #timeline-row { display: flex; align-items: center; gap: 10px; }
    #time-label { font-size: 0.72rem; font-weight: 700; color: var(--text); white-space: nowrap; min-width: 90px; text-align: right; }
    #scrubber {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 3px; border-radius: 2px; background: var(--border); outline: none; cursor: pointer;
    }
    #scrubber::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--red); cursor: pointer; box-shadow: 0 0 0 3px rgba(229,24,42,0.25); }
    #scrubber::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--red); border: none; }

    /* Buttons */
    #btn-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .ctrl-btn {
      background: var(--border); border: none; border-radius: 8px;
      color: var(--text); font-family: var(--font); font-size: 0.78rem; font-weight: 600;
      padding: 7px 14px; cursor: pointer; transition: background .15s;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .ctrl-btn:hover { background: #353847; }
    .ctrl-btn.primary { background: var(--red); color: #fff; }
    .ctrl-btn.primary:hover { background: #c9121f; }
    .ctrl-btn svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }
    #speed-select {
      background: var(--border); border: none; border-radius: 8px;
      color: var(--text); font-family: var(--font); font-size: 0.78rem; font-weight: 600;
      padding: 7px 10px; cursor: pointer; outline: none;
    }

    /* Error banner */
    #error-banner {
      display: none;
      position: absolute;
      bottom: 80px; left: 50%; transform: translateX(-50%);
      z-index: 600;
      background: #7f1d1d;
      border: 1px solid #b91c1c;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.75rem;
      color: #fca5a5;
      white-space: nowrap;
    }

    /* Leaflet overrides */
    .leaflet-control-zoom { border: none !important; }
    .leaflet-control-zoom a { background: var(--surface) !important; color: var(--text) !important; border: 1px solid var(--border) !important; width: 32px !important; height: 32px !important; line-height: 30px !important; }
    .leaflet-control-zoom a:hover { background: var(--border) !important; }
    .leaflet-control-attribution { display: none !important; }
    .leaflet-bar { box-shadow: none !important; }
  </style>
</head>
<body>
<div id="app">
  <div id="map-wrap">
    <div id="map"></div>
    <div id="map-timestamp">Loading…</div>
    <div id="loading">
      <div class="spin-ring"></div>
      <div id="loading-label">Fetching radar frames…</div>
      <div id="loading-prog"></div>
    </div>
    <div id="error-banner"></div>
  </div>

  <div id="controls">
    <div id="frame-dots"></div>
    <div id="timeline-row">
      <input type="range" id="scrubber" min="0" value="0">
      <div id="time-label">--:-- --</div>
    </div>
    <div id="btn-row">
      <button class="ctrl-btn" id="btn-prev">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn primary" id="btn-play">
        <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        <span id="play-label">Play</span>
      </button>
      <button class="ctrl-btn" id="btn-next">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6h2v12h-2z"/></svg>
      </button>
      <select id="speed-select">
        <option value="1200">Slow</option>
        <option value="700" selected>Normal</option>
        <option value="350">Fast</option>
        <option value="150">Fastest</option>
      </select>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════

// Ridge2 WMS — time-enabled MRMS composite reflectivity
// Proxied through your Cloudflare worker under /noaa/*
const WMS_BASE = 'https://mapservices.weather.noaa.gov/eventdriven/services/radar/radar_base_reflectivity_time/ImageServer/WMSServer';
const WMS_LAYER = 'radar_base_reflectivity_time';

// How many 10-min frames to load (past hour = 6, past 2hr = 12)
const FRAME_COUNT  = 10;
const FRAME_MIN    = 10; // minutes between frames
const RADAR_OPACITY = 0.75;

// ══════════════════════════════════════════
// MAP
// ══════════════════════════════════════════
const map = L.map('map', {
  center: [38.5, -96],
  zoom: 4,
  zoomControl: true,
  attributionControl: false,
  preferCanvas: false,
});

// Dark base map
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd',
  maxZoom: 19,
  updateWhenZooming: false,
}).addTo(map);

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let frames       = [];   // array of { timeISO, timeMs, label }
let radarLayers  = [];   // L.TileLayer.WMS per frame
let loadedFlags  = [];
let animPos      = 0;
let animTimer    = null;
let isPlaying    = false;
let animSpeed    = 700;
let activeLayer  = null;

const elLoading   = document.getElementById('loading');
const elLoadLabel = document.getElementById('loading-label');
const elLoadProg  = document.getElementById('loading-prog');
const elTimestamp = document.getElementById('map-timestamp');
const elScrubber  = document.getElementById('scrubber');
const elTimeLabel = document.getElementById('time-label');
const elDots      = document.getElementById('frame-dots');
const elErrBanner = document.getElementById('error-banner');

// ══════════════════════════════════════════
// BUILD FRAME LIST
// Generate timestamps working backwards from now
// in 10-minute MRMS intervals
// ══════════════════════════════════════════
function buildFrames() {
  const now = new Date();
  // Round down to nearest 10-min mark, then back off 10min for propagation lag
  now.setMinutes(Math.floor(now.getMinutes() / FRAME_MIN) * FRAME_MIN - FRAME_MIN, 0, 0);

  const result = [];
  for (let i = FRAME_COUNT - 1; i >= 0; i--) {
    const t = new Date(now.getTime() - i * FRAME_MIN * 60 * 1000);
    const iso = t.toISOString().replace(/\.\d{3}Z$/, 'Z'); // strict ISO for WMS TIME param
    const label = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    result.push({ timeISO: iso, timeMs: t.getTime(), label });
  }
  return result;
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function init() {
  // Clear old layers
  radarLayers.forEach(l => { if (map.hasLayer(l)) map.removeLayer(l); });
  radarLayers = [];
  loadedFlags = [];

  frames = buildFrames();
  const total = frames.length;

  elScrubber.max   = total - 1;
  elScrubber.value = total - 1;

  // Frame dots
  elDots.innerHTML = '';
  frames.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'fdot';
    d.id = `fdot-${i}`;
    elDots.appendChild(d);
  });

  elLoading.classList.remove('hidden');
  elLoadLabel.textContent = 'Loading radar frames…';
  elLoadProg.textContent  = `0 / ${total}`;

  let loadedCount = 0;

  frames.forEach((frame, i) => {
    const layer = L.tileLayer.wms(WMS_BASE, {
      layers:      WMS_LAYER,
      format:      'image/png',
      transparent: true,
      version:     '1.3.0',
      crs:         L.CRS.EPSG3857,
      TIME:        frame.timeISO,
      opacity:     0,
      zIndex:      200 + i,
      updateWhenZooming: false,
      keepBuffer:  2,
    });

    layer.on('load', () => {
      if (!loadedFlags[i]) {
        loadedFlags[i] = true;
        loadedCount++;
        document.getElementById(`fdot-${i}`)?.classList.add('loaded');
        elLoadProg.textContent = `${loadedCount} / ${total}`;

        if (loadedCount === total) {
          elLoading.classList.add('hidden');
          showFrame(total - 1);
          startPlay();
        }
      }
    });

    layer.on('tileerror', () => {
      // Count errors as loaded so we don't hang forever
      if (!loadedFlags[i]) {
        loadedFlags[i] = true;
        loadedCount++;
        elLoadProg.textContent = `${loadedCount} / ${total}`;
        if (loadedCount === total) {
          elLoading.classList.add('hidden');
          showFrame(total - 1);
          startPlay();
        }
      }
    });

    radarLayers.push(layer);
    layer.addTo(map);
    layer.setOpacity(0);
  });
}

// ══════════════════════════════════════════
// DISPLAY
// ══════════════════════════════════════════
function showFrame(index) {
  if (!frames.length) return;
  index = Math.max(0, Math.min(frames.length - 1, index));

  if (activeLayer) activeLayer.setOpacity(0);
  radarLayers[index].setOpacity(RADAR_OPACITY);
  activeLayer = radarLayers[index];
  animPos = index;

  const f = frames[index];
  const d = new Date(f.timeMs);
  const now = Date.now();
  const diffMin = Math.round((now - d.getTime()) / 60000);
  const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const ago = diffMin < 2 ? 'Just now' : diffMin < 60 ? `${diffMin}m ago` : `${Math.round(diffMin/60)}h ago`;
  elTimestamp.textContent = `${timeStr}  ·  ${ago}`;
  elTimeLabel.textContent = timeStr;
  elScrubber.value = index;

  frames.forEach((_, i) => {
    const d = document.getElementById(`fdot-${i}`);
    if (d) { d.classList.remove('active'); if (i === index) d.classList.add('active'); }
  });
}

// ══════════════════════════════════════════
// ANIMATION
// ══════════════════════════════════════════
function startPlay() {
  if (isPlaying) return;
  isPlaying = true;
  document.getElementById('play-icon').style.display  = 'none';
  document.getElementById('pause-icon').style.display = '';
  document.getElementById('play-label').textContent   = 'Pause';
  tick();
}

function stopPlay() {
  isPlaying = false;
  clearTimeout(animTimer);
  document.getElementById('play-icon').style.display  = '';
  document.getElementById('pause-icon').style.display = 'none';
  document.getElementById('play-label').textContent   = 'Play';
}

function tick() {
  if (!isPlaying) return;
  const next = (animPos + 1) % frames.length;
  showFrame(next);
  const delay = next === frames.length - 1 ? animSpeed * 2.5 : animSpeed;
  animTimer = setTimeout(tick, delay);
}

// ══════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════
document.getElementById('btn-play').addEventListener('click', () => isPlaying ? stopPlay() : startPlay());
document.getElementById('btn-prev').addEventListener('click', () => { stopPlay(); showFrame(animPos - 1); });
document.getElementById('btn-next').addEventListener('click', () => { stopPlay(); showFrame(animPos + 1); });
document.getElementById('scrubber').addEventListener('input', e => { stopPlay(); showFrame(parseInt(e.target.value)); });
document.getElementById('speed-select').addEventListener('change', e => { animSpeed = parseInt(e.target.value); });

// Auto-refresh every 10 min
setInterval(init, 10 * 60 * 1000);

// Boot
init();
</script>
</body>
</html>

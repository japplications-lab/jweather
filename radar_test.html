<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Radar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --surface: #161920;
      --border:  #2a2d36;
      --text:    #f0f2f7;
      --text-2:  #9ba3b8;
      --text-3:  #5c6480;
      --red:     #e5182a;
      --font:    -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100%; }

    #map { flex: 1; z-index: 1; }

    /* ── Controls bar ── */
    #controls {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Timeline scrubber */
    #timeline-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #time-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
      white-space: nowrap;
      min-width: 90px;
      text-align: right;
    }

    #scrubber {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    #scrubber::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--red);
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(229,24,42,0.25);
    }
    #scrubber::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--red);
      border: none;
      cursor: pointer;
    }

    /* Buttons row */
    #btn-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .ctrl-btn {
      background: var(--border);
      border: none;
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 7px 14px;
      cursor: pointer;
      transition: background .15s, color .15s;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .ctrl-btn:hover { background: #353847; }
    .ctrl-btn.primary { background: var(--red); color: #fff; }
    .ctrl-btn.primary:hover { background: #c9121f; }
    .ctrl-btn svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }

    /* Speed selector */
    #speed-select {
      background: var(--border);
      border: none;
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 7px 10px;
      cursor: pointer;
      outline: none;
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      z-index: 500;
      background: rgba(13,15,20,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      backdrop-filter: blur(4px);
    }
    #loading.hidden { display: none; }
    .spin-ring {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-label { font-size: 0.8rem; color: var(--text-2); letter-spacing: 0.04em; }
    #loading-progress { font-size: 0.72rem; color: var(--text-3); }

    /* Frame preload indicator */
    #frame-dots {
      display: flex;
      gap: 3px;
      align-items: center;
      justify-content: center;
    }
    .fdot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--border);
      transition: background .2s;
    }
    .fdot.loaded { background: var(--text-3); }
    .fdot.active { background: var(--red); transform: scale(1.3); }

    /* Timestamp overlay on map */
    #map-timestamp {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 400;
      background: rgba(13,15,20,0.75);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text);
      pointer-events: none;
      white-space: nowrap;
    }

    /* Leaflet overrides */
    .leaflet-control-zoom { border: none !important; }
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      width: 32px !important;
      height: 32px !important;
      line-height: 30px !important;
      font-size: 16px !important;
    }
    .leaflet-control-zoom a:hover { background: var(--border) !important; }
    .leaflet-control-attribution { display: none !important; }
    .leaflet-bar { box-shadow: none !important; }
  </style>
</head>
<body>
<div id="app">
  <div style="position:relative; flex:1; display:flex; flex-direction:column;">
    <div id="map"></div>
    <div id="map-timestamp">Loading…</div>
    <div id="loading">
      <div class="spin-ring"></div>
      <div id="loading-label">Loading radar frames</div>
      <div id="loading-progress"></div>
    </div>
  </div>

  <div id="controls">
    <!-- Frame dots -->
    <div id="frame-dots"></div>

    <!-- Scrubber -->
    <div id="timeline-row">
      <input type="range" id="scrubber" min="0" value="0">
      <div id="time-label">--:-- --</div>
    </div>

    <!-- Buttons -->
    <div id="btn-row">
      <button class="ctrl-btn" id="btn-prev" title="Previous frame">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn primary" id="btn-play" title="Play/Pause">
        <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        <span id="play-label">Play</span>
      </button>
      <button class="ctrl-btn" id="btn-next" title="Next frame">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.17 3.64L8 17.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
      <select id="speed-select" title="Animation speed">
        <option value="800">Slow</option>
        <option value="400" selected>Normal</option>
        <option value="200">Fast</option>
        <option value="100">Fastest</option>
      </select>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const RAINVIEWER_API = 'https://api.rainviewer.com/public/weather-maps.json';
const TILE_SIZE      = 256;
const COLOR_SCHEME   = 2;   // NEXRAD-style — see rainviewer.com/api/color-schemes.html
const SMOOTH         = 1;
const SNOW           = 1;
const EXT            = 'png';
const OPACITY        = 0.65;
const REFRESH_MS     = 5 * 60 * 1000; // re-fetch API every 5 min

// ══════════════════════════════════════════════
// MAP INIT
// ══════════════════════════════════════════════
const map = L.map('map', {
  center: [38.5, -96],
  zoom: 4,
  zoomControl: true,
  attributionControl: false,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// State borders layer
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  opacity: 0.08,
  maxZoom: 19,
}).addTo(map);

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let apiData       = null;
let mapFrames     = [];
let radarLayers   = [];   // L.TileLayer per frame (pre-created)
let loadedFlags   = [];   // bool per frame — tiles pre-fetched?
let animPos       = 0;
let animTimer     = null;
let isPlaying     = false;
let animSpeed     = 400;
let currentLayer  = null;

const elLoading      = document.getElementById('loading');
const elLoadingLabel = document.getElementById('loading-label');
const elLoadingProg  = document.getElementById('loading-progress');
const elTimestamp    = document.getElementById('map-timestamp');
const elScrubber     = document.getElementById('scrubber');
const elTimeLabel    = document.getElementById('time-label');
const elFrameDots    = document.getElementById('frame-dots');
const elBtnPlay      = document.getElementById('btn-play');
const elPlayIcon     = document.getElementById('play-icon');
const elPauseIcon    = document.getElementById('pause-icon');
const elPlayLabel    = document.getElementById('play-label');
const elSpeedSelect  = document.getElementById('speed-select');

// ══════════════════════════════════════════════
// API FETCH + INIT
// ══════════════════════════════════════════════
async function fetchAndInit() {
  try {
    const res  = await fetch(RAINVIEWER_API);
    const data = await res.json();
    apiData = data;
    initFrames(data);
  } catch(e) {
    elLoadingLabel.textContent = 'Failed to load radar data';
    elLoadingProg.textContent  = 'Check your connection and reload';
  }
}

function initFrames(data) {
  // Clean up old layers
  radarLayers.forEach(l => { if (map.hasLayer(l)) map.removeLayer(l); });
  radarLayers  = [];
  loadedFlags  = [];
  mapFrames    = [];
  animPos      = 0;

  if (!data?.radar?.past?.length) {
    elLoadingLabel.textContent = 'No radar data available';
    return;
  }

  // Use last 10 past frames for a snappy loop
  mapFrames = data.radar.past.slice(-10);

  const total = mapFrames.length;
  elScrubber.max = total - 1;
  elScrubber.value = total - 1;

  // Build frame dots
  elFrameDots.innerHTML = '';
  mapFrames.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'fdot';
    d.id = `fdot-${i}`;
    elFrameDots.appendChild(d);
  });

  // Pre-create all tile layers (not yet added to map)
  mapFrames.forEach((frame, i) => {
    const url = buildTileUrl(data.host, frame.path);
    const layer = L.tileLayer(url, {
      tileSize: TILE_SIZE,
      opacity: 0,
      zIndex: 200,
      updateWhenZooming: false,
      keepBuffer: 4,
    });
    radarLayers.push(layer);
    loadedFlags.push(false);
  });

  preloadAllFrames(total);
}

function buildTileUrl(host, path) {
  return `${host}${path}/${TILE_SIZE}/{z}/{x}/{y}/${COLOR_SCHEME}/${SMOOTH}_${SNOW}.${EXT}`;
}

// ══════════════════════════════════════════════
// PRELOAD — add every layer to map silently,
// wait for tileload, then hide. Once all loaded,
// start at latest frame and begin autoplay.
// ══════════════════════════════════════════════
function preloadAllFrames(total) {
  let loadedCount = 0;

  elLoading.classList.remove('hidden');
  elLoadingLabel.textContent = 'Loading radar frames';
  elLoadingProg.textContent  = `0 / ${total}`;

  mapFrames.forEach((_, i) => {
    const layer = radarLayers[i];

    layer.on('load', () => {
      if (!loadedFlags[i]) {
        loadedFlags[i] = true;
        loadedCount++;
        document.getElementById(`fdot-${i}`)?.classList.add('loaded');
        elLoadingProg.textContent = `${loadedCount} / ${total}`;

        if (loadedCount === total) {
          // All frames ready — hide loader, jump to latest, autoplay
          elLoading.classList.add('hidden');
          showFrame(total - 1);
          startPlay();
        }
      }
    });

    // Add silently at opacity 0 to trigger tile pre-fetch
    layer.addTo(map);
    layer.setOpacity(0);
  });
}

// ══════════════════════════════════════════════
// FRAME DISPLAY
// ══════════════════════════════════════════════
function showFrame(index) {
  if (!mapFrames.length) return;
  index = Math.max(0, Math.min(mapFrames.length - 1, index));

  // Fade out current
  if (currentLayer) currentLayer.setOpacity(0);

  // Fade in new
  radarLayers[index].setOpacity(OPACITY);
  currentLayer = radarLayers[index];
  animPos = index;

  // Update UI
  elScrubber.value = index;
  updateTimestamp(mapFrames[index].time);
  updateDots(index);
}

function updateTimestamp(unixSec) {
  const d   = new Date(unixSec * 1000);
  const now = new Date();
  const diffMin = Math.round((now - d) / 60000);
  const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const label   = diffMin < 2 ? 'Live' : diffMin < 60 ? `${diffMin}m ago` : `${Math.round(diffMin/60)}h ago`;
  elTimestamp.textContent = `${timeStr}  ·  ${label}`;
  elTimeLabel.textContent = timeStr;
}

function updateDots(activeIndex) {
  mapFrames.forEach((_, i) => {
    const d = document.getElementById(`fdot-${i}`);
    if (!d) return;
    d.classList.remove('active');
    if (i === activeIndex) d.classList.add('active');
  });
}

// ══════════════════════════════════════════════
// ANIMATION
// ══════════════════════════════════════════════
function startPlay() {
  if (isPlaying) return;
  isPlaying = true;
  elPlayIcon.style.display   = 'none';
  elPauseIcon.style.display  = '';
  elPlayLabel.textContent    = 'Pause';
  tick();
}

function stopPlay() {
  isPlaying = false;
  clearTimeout(animTimer);
  elPlayIcon.style.display   = '';
  elPauseIcon.style.display  = 'none';
  elPlayLabel.textContent    = 'Play';
}

function tick() {
  if (!isPlaying) return;
  const next = (animPos + 1) % mapFrames.length;
  showFrame(next);
  // Pause a beat longer on the last (latest) frame
  const delay = next === mapFrames.length - 1 ? animSpeed * 2.5 : animSpeed;
  animTimer = setTimeout(tick, delay);
}

// ══════════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════════
elBtnPlay.addEventListener('click', () => {
  isPlaying ? stopPlay() : startPlay();
});

document.getElementById('btn-prev').addEventListener('click', () => {
  stopPlay();
  showFrame(animPos - 1);
});

document.getElementById('btn-next').addEventListener('click', () => {
  stopPlay();
  showFrame(animPos + 1);
});

elScrubber.addEventListener('input', () => {
  stopPlay();
  showFrame(parseInt(elScrubber.value));
});

elSpeedSelect.addEventListener('change', () => {
  animSpeed = parseInt(elSpeedSelect.value);
});

// ══════════════════════════════════════════════
// AUTO-REFRESH every 5 minutes
// ══════════════════════════════════════════════
setInterval(fetchAndInit, REFRESH_MS);

// ══════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════
fetchAndInit();
</script>
</body>
</html>

name: Build jWeather
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Zip dist
        run: |
          cd dist
          zip -r ../jweather-dist.zip .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jweather-dist
          path: jweather-dist.zip

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jWeather — Back Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #f97316;
    --red-dim: rgba(249,115,22,0.15);
    --bg: #0d1117;
    --surface: #13181f;
    --border: rgba(255,255,255,0.08);
    --text: #e6edf3;
    --text2: #8b949e;
    --text4: #484f58;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated radar rings */
  .radar-bg {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 0;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(249,115,22,0.08);
    animation: radar-expand 4s ease-out infinite;
  }

  .ring:nth-child(1) { width: 200px; height: 200px; animation-delay: 0s; }
  .ring:nth-child(2) { width: 400px; height: 400px; animation-delay: 0.8s; }
  .ring:nth-child(3) { width: 600px; height: 600px; animation-delay: 1.6s; }
  .ring:nth-child(4) { width: 800px; height: 800px; animation-delay: 2.4s; }
  .ring:nth-child(5) { width: 1000px; height: 1000px; animation-delay: 3.2s; }

  @keyframes radar-expand {
    0% { opacity: 0; transform: scale(0.8); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: scale(1.1); }
  }

  /* Sweep line */
  .sweep {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
    animation: sweep-rotate 4s linear infinite;
  }

  .sweep::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 50%;
    height: 2px;
    transform-origin: left center;
    background: linear-gradient(to right, transparent, rgba(249,115,22,0.3));
    transform: rotate(0deg) translateY(-50%);
  }

  @keyframes sweep-rotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    opacity: 0.4;
  }

  /* Main content */
  .container {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 40px 24px;
    max-width: 500px;
    animation: fade-in 0.8s ease-out both;
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 48px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: var(--red);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-name {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .icon-wrap {
    width: 80px;
    height: 80px;
    background: var(--red-dim);
    border: 1px solid rgba(249,115,22,0.25);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    font-size: 36px;
    animation: pulse-icon 2s ease-in-out infinite;
  }

  @keyframes pulse-icon {
    0%, 100% { box-shadow: 0 0 0 0 rgba(249,115,22,0.3); }
    50% { box-shadow: 0 0 0 12px rgba(249,115,22,0); }
  }

  h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--text);
    margin-bottom: 12px;
    line-height: 1.1;
  }

  .subtitle {
    font-size: 1rem;
    color: var(--text2);
    font-weight: 400;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .status-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 32px;
    text-align: left;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    color: var(--text2);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .status-label {
    font-weight: 600;
    color: var(--text);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0;
  }

  .mono {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--text4);
    letter-spacing: 0.05em;
  }

  .footer {
    font-size: 0.72rem;
    color: var(--text4);
    margin-top: 8px;
  }

  .footer a {
    color: var(--red);
    text-decoration: none;
  }

  /* Animated dots */
  .dots::after {
    content: '';
    animation: dots 1.5s steps(4) infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }
</style>
</head>
<body>

<div class="radar-bg">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

<div class="sweep"></div>

<div class="container">
  <div class="logo">
    <div class="logo-mark">🌤</div>
    <span class="logo-name">jWeather</span>
  </div>

  <div class="icon-wrap">⚡</div>

  <h1>We'll Be Right Back</h1>
  <p class="subtitle">jWeather is temporarily offline for maintenance.<br>Severe weather data will return shortly.</p>

  <div class="status-card">
    <div class="status-row">
      <div class="status-dot"></div>
      <span class="status-label">System Status</span>
      <span style="margin-left:auto;" class="mono">MAINTENANCE</span>
    </div>
    <div class="divider"></div>
    <div class="status-row">
      <span style="font-size:0.75rem;">NWS alerts, radar, and outlooks will resume automatically once service is restored<span class="dots"></span></span>
    </div>
  </div>

  <p class="footer">
    jweather.app &nbsp;·&nbsp; <a href="mailto:admin@jweather.app">Contact</a>
  </p>
</div>

</body>
</html>
